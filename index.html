<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Weekly Bulletin Board</h1>
    <p>Add tasks for each day and stay organised!</p>
  </header>

  <main class="planner">
    <!-- Repeat this block for each day -->
    <section class="card" data-day="Monday">
      <h2>Monday</h2>
      <ul class="task-list"></ul>
      <input type="text" placeholder="Add a task..." class="task-input">
      <button class="add-task">Add</button>
    </section>

    <section class="card" data-day="Tuesday">
      <h2>Tuesday</h2>
      <ul class="task-list"></ul>
      <input type="text" placeholder="Add a task..." class="task-input">
      <button class="add-task">Add</button>
    </section>

    <section class="card" data-day="Wednesday">
      <h2>Wednesday</h2>
      <ul class="task-list"></ul>
      <input type="text" placeholder="Add a task..." class="task-input">
      <button class="add-task">Add</button>
    </section>

    <section class="card" data-day="Thursday">
      <h2>Thursday</h2>
      <ul class="task-list"></ul>
      <input type="text" placeholder="Add a task..." class="task-input">
      <button class="add-task">Add</button>
    </section>

    <section class="card" data-day="Friday">
      <h2>Friday</h2>
      <ul class="task-list"></ul>
      <input type="text" placeholder="Add a task..." class="task-input">
      <button class="add-task">Add</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
